name: Accessibility Scanner
on: workflow_dispatch

jobs:
  accessibility_scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: github/accessibility-scanner@v2
        with:
          urls: | # Provide a newline-delimited list of URLs to scan; more information below.
            https://cds.coinbase.com
          repository: coinbase/cds # Provide a repository name-with-owner (in the format "primer/primer-docs"). This is where issues will be filed and where Copilot will open PRs; more information below.
          token: ${{ secrets.GH_TOKEN }} # This token must have write access to the repo above (contents, issues, and PRs); more information below. Note: GitHub Actions' GITHUB_TOKEN cannot be used here.
          cache_key: coinbase.com # Provide a filename that will be used when caching results. We recommend including the name or domain of the site being scanned.
          skip_copilot_assignment: true
          include_screenshots: true # Optional: Set to true to capture screenshots and include links to them in filed issues
