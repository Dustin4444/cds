name: Visreg Check

on:
  workflow_call:
    inputs:
      source-paths:
        description: 'Space-separated source directories whose non-test .ts/.tsx changes trigger visreg (used for both the content hash and change detection)'
        required: true
        type: string
      cache-key-prefix:
        description: 'Prefix for the content-hash cache key (e.g. web-visreg-v1)'
        required: true
        type: string
      has-label:
        description: 'Whether the PR has the label that forces visreg to run'
        required: true
        type: boolean
    outputs:
      should_run:
        description: '"true" if visreg should run, "false" to skip'
        value: ${{ jobs.check.outputs.should_run }}
      content_hash:
        description: 'SHA256 of the current source file tree (empty for non-PR events)'
        value: ${{ jobs.check.outputs.content_hash }}

permissions:
  contents: read
  actions: read

jobs:
  check:
    name: Check if visreg should run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.evaluate.outputs.should_run }}
      content_hash: ${{ steps.hash.outputs.hash }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 100
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Fetch master for merge-base
        if: github.event_name == 'pull_request'
        run: git fetch -f --no-tags origin master:master --depth=100

      - name: Compute visreg content hash
        id: hash
        if: github.event_name == 'pull_request'
        env:
          SOURCE_PATHS: ${{ inputs.source-paths }}
        run: |
          HASH=$(git ls-tree -r HEAD -- $SOURCE_PATHS | grep -E '\.(ts|tsx)$' | grep -vE '\.(spec|test|figma|stories)\.' | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Check visreg result cache
        id: cache-check
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: .visreg-cache-marker
          key: ${{ inputs.cache-key-prefix }}-${{ steps.hash.outputs.hash }}
          lookup-only: true

      - name: Evaluate should run
        id: evaluate
        env:
          EVENT_NAME: ${{ github.event_name }}
          HAS_LABEL: ${{ inputs.has-label }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          CACHE_HIT: ${{ steps.cache-check.outputs.cache-hit }}
          SOURCE_PATHS: ${{ inputs.source-paths }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "Non-PR event, always running visreg"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HAS_LABEL" == "true" ]]; then
            # Label is an explicit opt-in — runs even on draft PRs.
            echo "visreg label present, running visreg"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [[ "$IS_DRAFT" == "true" ]]; then
            echo "Draft PR without visreg label, skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          elif [[ "$CACHE_HIT" == "true" ]]; then
            echo "Cache hit - visreg already passed with these exact files, skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            # Capture the exit code without tripping `set -e`. shouldRunVisreg exits
            # 0 = run, 1 = skip, and 2 = misconfiguration (e.g. empty source-paths).
            # Exit 2 must fail the job — treating it as a skip would silently drop
            # visual regression coverage.
            STATUS=0
            node tools/ci/shouldRunVisreg.mjs $SOURCE_PATHS || STATUS=$?
            case "$STATUS" in
              0)
                echo "Relevant changes detected, running visreg"
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                ;;
              1)
                echo "No relevant changes, skipping visreg"
                echo "should_run=false" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "::error::shouldRunVisreg failed (exit $STATUS); check the 'source-paths' input"
                exit "$STATUS"
                ;;
            esac
          fi
