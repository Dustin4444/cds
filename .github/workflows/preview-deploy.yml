name: Deploy PR Preview

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy'
        required: true
        type: number
      deploy_docs:
        description: 'Deploy documentation preview'
        required: false
        default: false
        type: boolean
      deploy_storybook:
        description: 'Deploy Storybook preview'
        required: false
        default: false
        type: boolean
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-deploy-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  CI: true
  NODE_ENV: production
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  # Lightweight pre-check: reads the PR body directly from the event payload.
  # No checkout or yarn install needed — completes in ~5s and gates the expensive deploy job.
  check:
    name: Check deploy options
    runs-on: ubuntu-latest
    outputs:
      deploy_docs: ${{ steps.parse.outputs.deploy_docs }}
      deploy_storybook: ${{ steps.parse.outputs.deploy_storybook }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Parse deploy options from PR body
        id: parse
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          DEPLOY_DOCS=false
          DEPLOY_STORYBOOK=false
          if echo "$PR_BODY" | grep -i "Deploy documentation preview" | grep -q "\[x\]"; then
            DEPLOY_DOCS=true
          fi
          if echo "$PR_BODY" | grep -i "Deploy Storybook preview" | grep -q "\[x\]"; then
            DEPLOY_STORYBOOK=true
          fi
          echo "deploy_docs=$DEPLOY_DOCS" >> $GITHUB_OUTPUT
          echo "deploy_storybook=$DEPLOY_STORYBOOK" >> $GITHUB_OUTPUT
          if [ "$DEPLOY_DOCS" = "false" ] && [ "$DEPLOY_STORYBOOK" = "false" ]; then
            echo "ℹ️ No preview checkboxes checked — skipping deploy."
          fi

  deploy:
    name: Deploy Previews
    needs: check
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.check.outputs.deploy_docs == 'true' ||
      needs.check.outputs.deploy_storybook == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      # Checkout the PR branch
      - name: Checkout PR
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || format('refs/pull/{0}/head', github.event.inputs.pr_number) }}

      # Setup Node and dependencies
      - name: Setup
        uses: ./.github/actions/setup

      # Get PR metadata (deploy options already resolved by the check job or inputs)
      - name: Get PR metadata and deploy options
        id: pr-metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
            echo "pr_branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
            echo "pr_author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
            echo "pr_commit=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
            echo "deploy_docs=${{ needs.check.outputs.deploy_docs }}" >> $GITHUB_OUTPUT
            echo "deploy_storybook=${{ needs.check.outputs.deploy_storybook }}" >> $GITHUB_OUTPUT
          else
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            PR_TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
            PR_BRANCH=$(gh pr view $PR_NUMBER --json headRefName -q '.headRefName')
            PR_AUTHOR=$(gh pr view $PR_NUMBER --json author -q '.author.login')
            PR_COMMIT=$(gh pr view $PR_NUMBER --json headRefOid -q '.headRefOid')
            echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
            echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
            echo "pr_author=$PR_AUTHOR" >> $GITHUB_OUTPUT
            echo "pr_commit=$PR_COMMIT" >> $GITHUB_OUTPUT
            echo "deploy_docs=${{ github.event.inputs.deploy_docs }}" >> $GITHUB_OUTPUT
            echo "deploy_storybook=${{ github.event.inputs.deploy_storybook }}" >> $GITHUB_OUTPUT
          fi

      # Build docs with custom baseUrl
      - name: Build Docs
        if: steps.pr-metadata.outputs.deploy_docs == 'true'
        run: BASE_URL=/cds/pr-${{ steps.pr-metadata.outputs.pr_number }}/docs/ yarn nx run docs:build

      # Build Storybook
      - name: Build Storybook
        if: steps.pr-metadata.outputs.deploy_storybook == 'true'
        run: yarn nx run storybook:build

      # Check if selector has changes
      - name: Check selector changes
        id: check-selector
        run: |
          # Check if any files in apps/preview-selector/ changed
          if git diff --name-only ${{ github.event.pull_request.base.sha || 'origin/master' }} HEAD | grep -q '^apps/preview-selector/'; then
            echo "selector_changed=true" >> $GITHUB_OUTPUT
            echo "✅ Selector has changes, will rebuild"
          else
            echo "selector_changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  Selector unchanged, will skip rebuild"
          fi

      # Build selector page (only if it has changes)
      - name: Build selector page
        if: steps.check-selector.outputs.selector_changed == 'true'
        run: yarn nx run preview-selector:build

      # Checkout gh-pages branch to separate directory.
      # fetch-depth: 1 since we squash history on every push — full history is never needed.
      - name: Checkout gh-pages
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: gh-pages
          path: gh-pages-checkout
          fetch-depth: 1

      # Copy builds, update manifest, and push to gh-pages.
      # Uses orphan commits (git commit-tree) so the branch always has a single root commit —
      # no binary blobs accumulate in history. On concurrent push conflicts, re-fetches the
      # latest state, re-applies this PR's changes on top, and retries with --force-with-lease.
      - name: Deploy previews to gh-pages
        working-directory: gh-pages-checkout
        env:
          PR_NUMBER: ${{ steps.pr-metadata.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr-metadata.outputs.pr_title }}
          PR_BRANCH: ${{ steps.pr-metadata.outputs.pr_branch }}
          PR_AUTHOR: ${{ steps.pr-metadata.outputs.pr_author }}
          PR_COMMIT: ${{ steps.pr-metadata.outputs.pr_commit }}
          DEPLOY_DOCS: ${{ steps.pr-metadata.outputs.deploy_docs }}
          DEPLOY_STORYBOOK: ${{ steps.pr-metadata.outputs.deploy_storybook }}
          SELECTOR_CHANGED: ${{ steps.check-selector.outputs.selector_changed }}
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copies this PR's build artifacts and updates manifest.json.
          # Safe to call multiple times — idempotent for this PR's files.
          apply_changes() {
            PR_DIR="pr-${PR_NUMBER}"
            mkdir -p "${PR_DIR}/docs" "${PR_DIR}/storybook"

            if [ "$DEPLOY_DOCS" = "true" ]; then
              cp -r ../apps/docs/dist/* "${PR_DIR}/docs/"
              echo "✅ Docs copied"
            fi
            if [ "$DEPLOY_STORYBOOK" = "true" ]; then
              cp -r ../apps/storybook/dist/* "${PR_DIR}/storybook/"
              echo "✅ Storybook copied"
            fi
            if [ "$SELECTOR_CHANGED" = "true" ]; then
              cp -r ../apps/preview-selector/dist/* ./
              echo "✅ Selector updated"
            else
              echo "⏭️  Selector unchanged, keeping existing version"
            fi

            if [ ! -f "manifest.json" ]; then
              echo '{"previews":[],"lastUpdated":"'$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'"}' > manifest.json
            fi

            node ../.github/scripts/update-manifest.mjs \
              "$PR_NUMBER" "$PR_TITLE" "$PR_BRANCH" "$PR_AUTHOR" "$PR_COMMIT" \
              "$DEPLOY_DOCS" "$DEPLOY_STORYBOOK"
          }

          # Start from the authoritative remote state
          git fetch origin gh-pages
          git reset --hard origin/gh-pages

          apply_changes
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          for i in 1 2 3; do
            # Create an orphan root commit from the current tree.
            # This replaces history entirely — the branch stays at depth 1 forever.
            SQUASHED=$(git commit-tree HEAD^{tree} -m "Deploy preview for PR #${PR_NUMBER}")

            # --force-with-lease ensures we don't overwrite a concurrent push we haven't seen
            if git push --force-with-lease origin "${SQUASHED}:refs/heads/gh-pages"; then
              echo "✅ Deployed to gh-pages"
              exit 0
            fi

            echo "Push failed (concurrent update?), re-merging and retrying ($i/3)..."
            # Random jitter (1-10s) desynchronizes concurrent retries so they don't
            # collide again on the next attempt (thundering herd mitigation).
            sleep $((RANDOM % 10 + 1))
            git fetch origin gh-pages
            git reset --hard origin/gh-pages
            apply_changes
            git add -A
          done

          echo "❌ Failed to push after 3 retries"
          exit 1

      # Comment on PR with preview link
      - name: Comment on PR
        if: success()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = ${{ steps.pr-metadata.outputs.pr_number }};
            const deployDocs = '${{ steps.pr-metadata.outputs.deploy_docs }}' === 'true';
            const deployStorybook = '${{ steps.pr-metadata.outputs.deploy_storybook }}' === 'true';

            const docsUrl = `https://coinbase.github.io/cds/pr-${prNumber}/docs/`;
            const storybookUrl = `https://coinbase.github.io/cds/pr-${prNumber}/storybook/`;

            let previewLinks = '';
            if (deployDocs) {
              previewLinks += `\n📄 **Documentation:** [View Docs →](${docsUrl})`;
            }
            if (deployStorybook) {
              previewLinks += `\n📚 **Storybook:** [View Storybook →](${storybookUrl})`;
            }

            if (!deployDocs && !deployStorybook) {
              console.log('No previews deployed, skipping comment');
              return;
            }

            const comment = `## 🚀 Preview${deployDocs && deployStorybook ? 's' : ''} Deployed

            Your preview${deployDocs && deployStorybook ? 's are' : ' is'} ready!
            ${previewLinks}

            ---

            📝 Updated: \`${new Date().toISOString()}\`
            🔨 Commit: \`${{ steps.pr-metadata.outputs.pr_commit }}\`

            > Preview${deployDocs && deployStorybook ? 's' : ''} will be automatically removed when the PR is closed.
            > To change what's deployed, edit the checkboxes in the PR description.`;

            // Check if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🚀 Preview Deployed')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment,
              });
            }
