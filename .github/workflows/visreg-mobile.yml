name: Mobile Visreg

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
    branches: [master]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Percy branch name override (defaults to current git branch)'
        required: false
        default: ''

concurrency:
  group: Visreg-Mobile-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  actions: read
  pull-requests: write

env:
  CI: true

jobs:
  check:
    name: Check if visreg should run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.evaluate.outputs.should_run }}
      content_hash: ${{ steps.hash.outputs.hash }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 100
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Fetch master for merge-base
        if: github.event_name == 'pull_request'
        run: git fetch -f --no-tags origin master:master --depth=100

      - name: Compute visreg content hash
        id: hash
        if: github.event_name == 'pull_request'
        run: |
          HASH=$(git ls-tree -r HEAD -- packages/mobile/src | grep -E '\.(ts|tsx)$' | grep -vE '\.(spec|test|figma|stories)\.' | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Check visreg result cache
        id: cache-check
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: .visreg-cache-marker
          key: mobile-visreg-v1-${{ steps.hash.outputs.hash }}
          lookup-only: true

      - name: Evaluate should run
        id: evaluate
        env:
          EVENT_NAME: ${{ github.event_name }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'visreg-mobile') }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          CACHE_HIT: ${{ steps.cache-check.outputs.cache-hit }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "Non-PR event, always running visreg"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HAS_LABEL" == "true" ]]; then
            # Label is an explicit opt-in — runs even on draft PRs.
            echo "visreg-mobile label present, running visreg"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [[ "$IS_DRAFT" == "true" ]]; then
            echo "Draft PR without visreg-mobile label, skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          elif [[ "$CACHE_HIT" == "true" ]]; then
            echo "Cache hit - visreg already passed with these exact files, skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          elif node packages/mobile-visreg/scripts/shouldRunVisreg.mjs; then
            echo "Relevant changes detected, running visreg"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No relevant changes, skipping visreg"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # iOS visreg runs entirely on ubuntu-latest: the committed device .ipa is
  # JS-bundle-patched (unzip -> swap main.jsbundle -> rezip), uploaded to
  # BrowserStack App Automate, and run on a real device. BrowserStack re-signs
  # the .ipa on upload, so no macOS runner or Apple signing is needed here.
  ios:
    name: Visreg iOS
    needs: [check]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      percy_url: ${{ steps.percy-upload.outputs.percy_url }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup

      - name: Set Percy branch
        env:
          BRANCH_INPUT: ${{ inputs.branch }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "$BRANCH_INPUT" ]]; then
            echo "PERCY_BRANCH=$BRANCH_INPUT" >> "$GITHUB_ENV"
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "PERCY_BRANCH=$HEAD_REF" >> "$GITHUB_ENV"
          else
            echo "PERCY_BRANCH=$REF_NAME" >> "$GITHUB_ENV"
          fi

      - name: Prepare iOS app (patch JS bundle into device .ipa)
        run: yarn nx run expo-app:patch-bundle --configuration=ios-device

      - name: Run visreg on BrowserStack
        run: yarn nx run mobile-visreg:browserstack-ios
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: screenshots-ios
          path: packages/mobile-visreg/maestro-test-output/screenshots/
          if-no-files-found: ignore

      - name: Upload to Percy
        id: percy-upload
        if: always()
        run: |
          OUTPUT=$(yarn nx run mobile-visreg:upload 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          PERCY_URL=$(echo "$OUTPUT" | grep -oE 'https://percy\.io[^[:space:]]+' | head -1)
          echo "percy_url=$PERCY_URL" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN_MOBILE }}
          PERCY_BRANCH: ${{ env.PERCY_BRANCH }}
          PERCY_PARALLEL_NONCE: ${{ github.run_id }}
          PERCY_PARALLEL_TOTAL: 2

  # Android visreg runs on ubuntu-latest. The committed release .apk is
  # JS-bundle-patched (zip splice + zipalign + apksigner debug re-sign), then
  # uploaded to BrowserStack App Automate and run on a real device.
  android:
    name: Visreg Android
    needs: [check]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      percy_url: ${{ steps.percy-upload.outputs.percy_url }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup

      - name: Set Percy branch
        env:
          BRANCH_INPUT: ${{ inputs.branch }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "$BRANCH_INPUT" ]]; then
            echo "PERCY_BRANCH=$BRANCH_INPUT" >> "$GITHUB_ENV"
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "PERCY_BRANCH=$HEAD_REF" >> "$GITHUB_ENV"
          else
            echo "PERCY_BRANCH=$REF_NAME" >> "$GITHUB_ENV"
          fi

      - name: Setup Android build tools
        run: |
          # zipalign + apksigner (used by patch-bundle android) live in build-tools
          BUILD_TOOLS_DIR="$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -1)"
          echo "$BUILD_TOOLS_DIR" >> "$GITHUB_PATH"
          # The APK is re-signed with the standard Android debug keystore; create
          # it if the runner doesn't already have one.
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            mkdir -p "$HOME/.android"
            keytool -genkeypair -v -keystore "$HOME/.android/debug.keystore" \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Prepare Android app (patch JS bundle into .apk)
        run: yarn nx run expo-app:patch-bundle --configuration=android

      - name: Run visreg on BrowserStack
        run: yarn nx run mobile-visreg:browserstack-android
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: screenshots-android
          path: packages/mobile-visreg/maestro-test-output/screenshots/
          if-no-files-found: ignore

      - name: Upload to Percy
        id: percy-upload
        if: always()
        run: |
          OUTPUT=$(yarn nx run mobile-visreg:upload 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          PERCY_URL=$(echo "$OUTPUT" | grep -oE 'https://percy\.io[^[:space:]]+' | head -1)
          echo "percy_url=$PERCY_URL" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN_MOBILE }}
          PERCY_BRANCH: ${{ env.PERCY_BRANCH }}
          PERCY_PARALLEL_NONCE: ${{ github.run_id }}
          PERCY_PARALLEL_TOTAL: 2

  # Persist the visreg result cache only when BOTH platforms pass, so a partial
  # failure doesn't let a later run skip via the content-hash cache.
  finalize:
    name: Save visreg result cache
    needs: [check, ios, android]
    if: github.event_name == 'pull_request' && needs.ios.result == 'success' && needs.android.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Create visreg cache marker
        run: touch .visreg-cache-marker
      - name: Save visreg result cache
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: .visreg-cache-marker
          key: mobile-visreg-v1-${{ needs.check.outputs.content_hash }}

  comment-pr:
    name: Comment Percy Link
    needs: [ios, android]
    if: always() && github.event_name == 'pull_request' && (needs.ios.outputs.percy_url != '' || needs.android.outputs.percy_url != '')
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Post Percy link on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PERCY_URL: ${{ needs.ios.outputs.percy_url || needs.android.outputs.percy_url }}
        run: |
          EXISTING=$(gh api \
            "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | startswith("https://percy.io")))] | last | .body // ""')

          if [ "$EXISTING" = "$PERCY_URL" ]; then
            echo "Percy URL unchanged, skipping comment."
            exit 0
          fi

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "$PERCY_URL" \
            --edit-last 2>/dev/null || \
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "$PERCY_URL"
