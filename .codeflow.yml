secure:
  required_reviews: 1
  codeowners_enabled: true
  # NOTE: Codeflow does not support glob patterns; long-lived support branches
  # must be enumerated explicitly. When cutting a new LTS (`release-N.x`) or pre-release branch add it here
  branches:
    - master
    - release-8.x
  auto_assign_reviewers: true
  # Marks
  upstream_repository: coinbase/cds
build:
  engines:
    # Apps
    # Deployed from internal mirror repo (cds-public)
    # Sync GHA automatically runs every 1-2 hours
    - BaldurECR:
        # production docsite
        # build/deploy managed by Codeflow (see "AWS Config" tab for bucket name)
        # for bucket config see aws-resources: projects/frontend/cds-public.gps.yml
        # for DNS mapping see entry-gateway: config/public.production.aws.use1/cds.coinbase.com.yml
        name: cds-next-docs
        path: ./apps/docs/production.Dockerfile
        autobuild: true
    - BaldurECR:
        name: cds-docs-dev
        path: ./apps/docs/development.Dockerfile
        autobuild: false
    - BaldurECR:
        # production storybook
        # build/deploy managed by Codeflow (see "AWS Config" tab for bucket name)
        # for bucket config see aws-resources: projects/frontend/cds-public.gps.yml
        # for DNS mapping see entry-gateway: config/public.production.aws.use1/cds-storybook.coinbase.com.yml
        name: cds-storybook
        path: ./apps/storybook/production.Dockerfile
        autobuild: true
    - BaldurECR:
        name: cds-storybook-dev
        path: ./apps/storybook/development.Dockerfile
        autobuild: false
    # Static assets
    # Deployed from internal mirror repo (cds-public)
    # Sync GHA automatically runs every 1-2 hours
    - BaldurECR:
        name: static-assets
        path: ./libs/static-assets/static-assets.Dockerfile
        autobuild_files:
          - packages/illustrations/package.json
